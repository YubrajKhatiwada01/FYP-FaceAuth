{% extends "base.html" %}

{% block content %}
<div class="dashboard-container">
  <!-- Sidebar Navigation -->
  <aside class="dashboard-sidebar" id="sidebarNav">
    <div class="sidebar-header">
      <a href="{{ url_for('dashboard') }}" class="sidebar-brand">
        <span class="brand-mark" aria-hidden="true">
          <img src="{{ url_for('static', filename='images/final logo.png') }}" alt="FaceAuth Logo">
        </span>
        <span>FaceAuth</span>
      </a>
      <button class="sidebar-close" type="button" aria-label="Close sidebar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('dashboard') }}" class="nav-item{{ ' is-active' if active_page == 'dashboard' else '' }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="{{ url_for('users') }}" class="nav-item{{ ' is-active' if active_page == 'users' else '' }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>Users</span>
      </a>
      <a href="{{ url_for('authentication') }}" class="nav-item{{ ' is-active' if active_page == 'authentication' else '' }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 7 L16 12 L23 17 Z"></path>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
        <span>Authentication</span>
      </a>
      <a href="{{ url_for('access_control') }}" class="nav-item{{ ' is-active' if active_page == 'access_control' else '' }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 20a6 6 0 0 1 10.5-1v-3.5a6 6 0 0 1 8.3-5.5"></path>
          <circle cx="18" cy="5" r="3"></circle>
        </svg>
        <span>Access Control</span>
      </a>
      <a href="{{ url_for('logs') }}" class="nav-item{{ ' is-active' if active_page == 'logs' else '' }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        <span>Logs</span>
      </a>
      <a href="{{ url_for('settings') }}" class="nav-item{{ ' is-active' if active_page == 'settings' else '' }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"></circle>
          <path d="M12 1v6m0 6v6"></path>
          <path d="M4.22 4.22l4.24 4.24m2.12 2.12l4.24 4.24"></path>
          <path d="M1 12h6m6 0h6"></path>
          <path d="M4.22 19.78l4.24-4.24m2.12-2.12l4.24-4.24"></path>
          <path d="M12 19v4"></path>
          <path d="M19.78 19.78l-4.24-4.24m-2.12-2.12l-4.24-4.24"></path>
          <path d="M19 12h-4"></path>
          <path d="M19.78 4.22l-4.24 4.24m-2.12 2.12l-4.24 4.24"></path>
        </svg>
        <span>Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="{{ url_for('logout') }}" class="logout-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="dashboard-content">
    <!-- Header -->
    <header class="dashboard-header">
      <button class="hamburger-menu" id="hamburgerToggle" type="button" aria-label="Toggle sidebar" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="header-title">
        <h1>{% block dashboard_title %}{% endblock %}</h1>
        <p class="subtitle">{% block dashboard_subtitle %}{% endblock %}</p>
      </div>

      <div class="header-actions">
        <button class="header-btn" aria-label="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          {% set count = self.dashboard_notifications_count()|trim %}
          {% if count and count != '0' %}
          <span class="notification-badge">{% block dashboard_notifications_count %}0{% endblock %}</span>
          {% endif %}
        </button>
        <button class="header-btn profile-btn" aria-label="Profile menu">
          <div class="avatar">{{ operator_id|first if operator_id else 'U' }}</div>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="dashboard-main">
      {% block dashboard_content %}{% endblock %}
    </main>
  </div>
</div>

<!-- Overlay for sidebar on mobile -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
{% endblock %}
